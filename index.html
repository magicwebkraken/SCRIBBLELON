    <style id="site-gallery-styles">
      .site-gallery-section {
        width: 100%;
        background: #1b1b1b;

        border-top: 2px solid #3ed44f;
      }
      .site-gallery-section h2 {
        font-family: Wallpoet, system-ui, sans-serif;
        color: #3ed44f;
        text-align: center;

        text-transform: uppercase;

        max-width: 36rem;
        margin-left: auto;
        margin-right: auto;
      }
      .site-gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));

        margin: 0 auto;
        list-style: none;
        padding: 0;

      .site-gallery-grid li {
        margin: 0;
      }

        cursor: pointer;
        background: #111;
        transition: transform 0.2s ease, box-shadow 0.2s ease;

    <script>
      (function () {
        function placeGalleryAfterTokenomics() {
          var gallery = document.getElementById("gallery");
          var box = document.querySelector(".contentbox");
          if (!gallery || !box) return false;
          var wrapper = null;
          var i,
            ch,
            len = box.children.length;
          for (i = 0; i < len; i++) {
            ch = box.children[i];
            if (
              ch.querySelector &&
              ch.querySelector(".grid.grid-cols-2")
            ) {
              wrapper = ch;
              break;
            }
          }
          if (!wrapper) {
            for (i = 0; i < len; i++) {
              ch = box.children[i];
              if (ch.querySelector && ch.querySelector(".grid")) {
                wrapper = ch;
                break;
              }
            }
          }
          if (!wrapper) return false;
          wrapper.insertAdjacentElement("afterend", gallery);
          placeDexChartAfterGallery();
          return true;
        }

        function placeDexChartAfterGallery() {
          var chart = document.getElementById("dex-chart");
          var gallery = document.getElementById("gallery");
          if (!chart || !gallery) return false;
          gallery.insertAdjacentElement("afterend", chart);
          return true;
        }

        function startPlacementRetries() {
          if (placeGalleryAfterTokenomics()) return;
          var attempts = 0;
          var t = setInterval(function () {
            attempts++;
            if (placeGalleryAfterTokenomics() || attempts > 80) {
              clearInterval(t);
            }
          }, 50);
        }

        if (document.readyState === "loading") {
          document.addEventListener(
            "DOMContentLoaded",
            startPlacementRetries
          );
        } else {
          startPlacementRetries();
        }

        var dialog = document.getElementById("site-gallery-dialog");
        var full = document.getElementById("site-gallery-dialog-img");
        var closeBtn = document.getElementById("site-gallery-close");
        if (!dialog || !full || !closeBtn) return;
        document.querySelectorAll("[data-gallery-src]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            full.src = btn.getAttribute("data-gallery-src") || "";
            full.alt = btn.getAttribute("data-gallery-alt") || "";
            if (dialog.showModal) dialog.showModal();
          });
        });
        closeBtn.addEventListener("click", function () {
          dialog.close();
        });
        dialog.addEventListener("click", function (e) {
          if (e.target === dialog) dialog.close();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && dialog.open) dialog.close();
        });
      })();
    </script>
